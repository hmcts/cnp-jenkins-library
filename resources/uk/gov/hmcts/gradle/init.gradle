def nonProdName = System.getenv("NONPROD_SUBSCRIPTION_NAME")

def mirrorHost = nonProdName == "sandbox" || nonProdName == "sbox"
    ? "artifactory.sandbox"
    : "artifactory"

def mirrorUrl = "https://${mirrorHost}.platform.hmcts.net/artifactory/maven-remotes"
def azureUrl = "https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1"

allprojects {
    repositories.clear()
    repositories {
        maven {
            url = uri(mirrorUrl)
        }
        maven {
            url = uri(azureUrl)
        }
         maven {
           url = uri("https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/temp-maven-central-mirror/maven/v1")
        }
    }

    buildscript {
        repositories.clear()
        repositories {
            maven {
                url = uri(mirrorUrl)
            }
            maven {
                url = uri(azureUrl)
            }
        }

        dependencies {
            classpath group: "org.postgresql", name: "postgresql", version: "42.6.0"
        }
    }
}

settingsEvaluated { settings ->
    settings.pluginManagement {
        repositories.clear()
        repositories {
            maven {
                url = uri(mirrorUrl)
            }
            maven {
                url = uri(azureUrl)
            }
        }
    }
}

allprojects {
    afterEvaluate { project ->
        if (project.hasProperty("dependencyCheck")) {
            configure(project) {
                dependencyCheck {
                    autoUpdate = false
                    hostedSuppressions.forceupdate = true
                    failBuildOnCVSS = 0
                    formats.add("JSON")

                    if (!("runtimeClasspath" in scanConfigurations)) {
                        scanConfigurations.add("runtimeClasspath")
                    }

                    skipConfigurations = []
                }
            }
        }
    }
}

gradle.settingsEvaluated { settings ->

    println "========== Plugin Management Repositories =========="

    settings.pluginManagement.repositories.each { repo ->
        if (repo.hasProperty("url")) {
            println "PLUGIN REPO -> ${repo.name} : ${repo.url}"
        } else {
            println "PLUGIN REPO -> ${repo.name}"
        }
    }

    println "===================================================="
}

gradle.projectsLoaded {

    rootProject.allprojects { project ->

        println "========== Project: ${project.path} =========="

        println "--- repositories ---"
        project.repositories.each { repo ->
            if (repo.hasProperty("url")) {
                println "REPO -> ${repo.name} : ${repo.url}"
            } else {
                println "REPO -> ${repo.name}"
            }
        }

        println "--- buildscript repositories ---"
        project.buildscript.repositories.each { repo ->
            if (repo.hasProperty("url")) {
                println "BUILD REPO -> ${repo.name} : ${repo.url}"
            } else {
                println "BUILD REPO -> ${repo.name}"
            }
        }

        println "=============================================="
    }
}

gradle.projectsEvaluated {
    rootProject.allprojects { project ->
        println "========== Final repos for ${project.path} =========="
        project.repositories.each { repo ->
            println "REPO -> ${repo.name} : ${repo.hasProperty('url') ? repo.url : repo}"
        }
    }
}
gradle.settingsEvaluated { settings ->
    println "========== Plugin repos =========="
    settings.pluginManagement.repositories.each { repo ->
        println "PLUGIN REPO -> ${repo.name} : ${repo.hasProperty('url') ? repo.url : repo}"
    }
}

gradle.beforeProject { project ->
    println "========== Before project ${project.path} =========="
    project.buildscript.repositories.each { repo ->
        println "BUILD REPO -> ${repo.name} : ${repo.hasProperty('url') ? repo.url : repo}"
    }
    project.repositories.each { repo ->
        println "REPO -> ${repo.name} : ${repo.hasProperty('url') ? repo.url : repo}"
    }
}
