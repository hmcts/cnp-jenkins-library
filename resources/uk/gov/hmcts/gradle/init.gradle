def nonProdName = System.getenv("NONPROD_SUBSCRIPTION_NAME")

def mirrorHost = nonProdName == "sandbox" || nonProdName == "sbox"
    ? "artifactory.sandbox"
    : "artifactory"

def mirrorUrl = "https://${mirrorHost}.platform.hmcts.net/artifactory/maven-remotes"
def azureUrl = "https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1"

allprojects {
    repositories.clear()
    repositories {
        maven {
            url = uri(mirrorUrl)
        }
        maven {
            url = uri(azureUrl)
        }
    }

    buildscript {
        repositories.clear()
        repositories {
            maven {
                url = uri(mirrorUrl)
            }
            maven {
                url = uri(azureUrl)
            }
        }

        dependencies {
            classpath group: "org.postgresql", name: "postgresql", version: "42.6.0"
        }
    }
}

settingsEvaluated { settings ->
    settings.pluginManagement {
        repositories.clear()
        repositories {
            maven {
                url = uri(mirrorUrl)
            }
            maven {
                url = uri(azureUrl)
            }
            gradlePluginPortal()
        }
    }
}

allprojects {
    afterEvaluate { project ->
        if (project.hasProperty("dependencyCheck")) {
            configure(project) {
                dependencyCheck {
                    autoUpdate = false
                    hostedSuppressions.forceupdate = true
                    failBuildOnCVSS = 0
                    formats.add("JSON")

                    if (!("runtimeClasspath" in scanConfigurations)) {
                        scanConfigurations.add("runtimeClasspath")
                    }

                    skipConfigurations = []
                }
            }
        }
    }
}
