import org.gradle.authentication.http.BasicAuthentication

def nonProdName = System.getenv("NONPROD_SUBSCRIPTION_NAME")

def mirrorHost = nonProdName == "sandbox" || nonProdName == "sbox" ? 'artifactory.sandbox' : 'artifactory'
def mirrorUrl = "https://${mirrorHost}.platform.hmcts.net/artifactory/maven-remotes"

// Azure DevOps Artifacts feed used as a Maven Central mirror
def adoMavenMirrorUrl = 'https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/temp-maven-central-mirror/maven/v1'
def adoMavenPat = System.getenv('ADO_MAVEN_PAT') ?: ''

allprojects {
  repositories {
    maven { url mirrorUrl }
    maven {
      url adoMavenMirrorUrl
      name 'temp-maven-central-mirror'
      credentials {
        username = 'jenkins'
        password = adoMavenPat
      }
      authentication { basic(BasicAuthentication) }
    }
  }
  buildscript {
    repositories {
      maven { url mirrorUrl }
      maven {
        url adoMavenMirrorUrl
        name 'temp-maven-central-mirror'
        credentials {
          username = 'jenkins'
          password = adoMavenPat
        }
        authentication { basic(BasicAuthentication) }
      }
    }
    dependencies {
      classpath  group: 'org.postgresql', name: 'postgresql', version: '42.6.0'
    }
  }

  // Strip any repositories the project itself declares (e.g. mavenCentral())
  // and force resolution through our mirrors only. Runs after the project's
  // build.gradle has been evaluated so it overrides project-level config.
  afterEvaluate { project ->
    project.repositories.clear()
    project.repositories {
      maven { url mirrorUrl }
      maven {
        url adoMavenMirrorUrl
        name 'temp-maven-central-mirror'
        credentials {
          username = 'jenkins'
          password = adoMavenPat
        }
        authentication { basic(BasicAuthentication) }
      }
    }
  }

  task printVersionInit {
    doLast { println project.version }
  }
}

settingsEvaluated { settings ->
  settings.pluginManagement {
    repositories {
      maven { url mirrorUrl }
      maven {
        url adoMavenMirrorUrl
        name 'temp-maven-central-mirror'
        credentials {
          username = 'jenkins'
          password = adoMavenPat
        }
        authentication { basic(BasicAuthentication) }
      }
    }
  }
}

allprojects {
  afterEvaluate { project ->
    if (project.hasProperty('dependencyCheck')) {
      configure(project) {
        dependencyCheck {
          autoUpdate = false
          hostedSuppressions.forceupdate = true
          // Any CVE should fail the build.
          failBuildOnCVSS = 0

          // JSON dependency check reports are logged to cosmos for reporting.
          formats.add('JSON')

          // Scan only the dependencies used at application runtime.
          // See https://docs.gradle.org/current/userguide/java_plugin.html#sec:java_plugin_and_dependency_management
          if (!('runtimeClasspath' in it.scanConfigurations)) {
            scanConfigurations.add('runtimeClasspath')
          }
          // Scan and skip configurations are mutually exclusive,
          // so we must clear any skipped configurations the build may have configured.
          skipConfigurations = []
        }
      }
    }
  }
}
